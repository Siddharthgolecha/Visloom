# infra/compose/redis/redis.conf — dev overlay base config.
#
# No persistence directives: dev matches ADR 0004's "docker compose
# down -v && make up = full reset" — no RDB/AOF to survive a reset.
# The prod overlay (compose.prod.yml) passes `--appendonly yes` plus
# a memory limit as container command overrides rather than a second
# config file, so the two overlays don't fork this file.
#
# Sized for ADR 0016's three key classes (streams, session cache,
# rate-limit counters) — none of which need persistence to be
# correct, since sessions/rate-limits are caches over Postgres or
# self-expiring, and streams are the durability boundary the worker's
# consumer-group XACK already handles.

bind 0.0.0.0
protected-mode no
appendonly no
