name: compose

# Config-validation only (not a smoke test) — catches a typo'd compose
# key, Caddyfile, or OTel collector config on any PR touching the stack.
# Full `up`/health-check smoke testing is a local/slice-9 concern.
# Path-filtered to skip pure docs/task-dir changes.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v5
      - id: filter
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            compose:
              - 'infra/compose/**'
              - '.github/workflows/compose.yml'

  config:
    needs: changes
    if: needs.changes.outputs.compose == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Validate base overlay
        run: docker compose -f infra/compose/compose.yml config -q

      - name: Validate prod overlay
        run: docker compose -f infra/compose/compose.yml -f infra/compose/compose.prod.yml config -q

      - name: Validate Caddyfile
        run: |
          docker run --rm -v "$PWD/infra/compose/caddy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2 caddy validate --config /etc/caddy/Caddyfile

      - name: Validate OTel collector config
        run: |
          docker run --rm -v "$PWD/infra/compose/otel/collector.yaml:/etc/otel/collector.yaml:ro" \
            otel/opentelemetry-collector:0.113.0 validate --config /etc/otel/collector.yaml
